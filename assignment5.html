<!DOCTYPE html>
<html>
<head>
    <title>AI Personal Bio</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .card {
            width: 350px;
            background: white;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0px 0px 10px lightgray;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #ddd;
            margin: auto;
        }

        h1 {
            margin: 15px 0 5px 0;
        }

        .role {
            color: gray;
            margin-bottom: 15px;
        }

        p {
            font-size: 14px;
            color: #333;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #0d6efd;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background: #084298;
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="profile-img"></div>

        <h1>AI Assistant</h1>
        <div class="role">Web Developer | AI Enthusiast</div>

        <p>
            I am learning web development and artificial intelligence.
        </p>

        <a href="#" class="btn">Contact Me</a>

    </div>

</body>
</html>
