<!DOCTYPE html>
<html>
<head>
    <title>Bano Qabil</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        /* Navbar */
        .navbar {
            background: #0d6efd;
            padding: 15px;
            color: white;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        /* Hero Section */
        .hero {
            background: #f2f2f2;
            text-align: center;
            padding: 60px 20px;
        }

        .hero h1 {
            font-size: 40px;
            color: #333;
        }

        .hero p {
            font-size: 18px;
            color: #666;
        }

        .btn {
            background: #0d6efd;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            margin-top: 15px;
        }

        /* Section */
        .section {
            padding: 40px;
            text-align: center;
        }

        .box {
            display: inline-block;
            width: 200px;
            padding: 20px;
            margin: 10px;
            background: white;
            box-shadow: 0px 0px 10px lightgray;
        }

        /* Footer */
        .footer {
            background: black;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="navbar">
        Bano Qabil Program
    </div>

    <div class="hero">
        <h1>Learn Skills for Free</h1>
        <p>Web Development, IT Skills and Freelancing</p>
        <button class="btn">Apply Now</button>
    </div>

    <div class="section">
        <h2>Courses</h2>

        <div class="box">Web Development</div>
        <div class="box">Graphic Design</div>
        <div class="box">Digital Marketing</div>
    </div>

    <div class="footer">
        © 2026 Bano Qabil Clone Demo
    </div>

</body>
</html>
